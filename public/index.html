<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment ID</title>

    <link
      id="dynamic-favicon"
      rel="icon"
      type="image/png"
      href="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
        background-image:
          radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
        background-size: cover;
        background-attachment: fixed;
        color: #334155;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .fade-enter {
        animation: fadeEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .receipt-cut {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 8px,
          #f8fafc 9px
        );
        background-size: 20px 10px;
        background-repeat: repeat-x;
        height: 12px;
        width: 100%;
        transform: rotate(180deg);
      }
      .success-pop {
        animation: successPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards;
      }
      @keyframes successPop {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="hidden sm:block absolute w-[600px] h-[600px] bg-indigo-500/20 rounded-full blur-[120px] pointer-events-none"
    ></div>

    <div
      id="main-container"
      class="w-full h-full sm:max-w-[420px] sm:h-[90vh] glass-panel sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col sm:border sm:border-white/40 z-10 transition-all duration-500"
    >
      <header
        class="flex-none px-6 py-4 bg-white/90 border-b border-slate-100 flex items-center justify-between backdrop-blur-xl z-20 sticky top-0"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-md border border-slate-200 overflow-hidden p-1"
          >
            <img
              id="header-logo"
              src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
              class="w-full h-full object-contain"
            />
          </div>
          <div>
            <h1
              id="header-title"
              class="font-bold text-base text-slate-900 leading-tight"
            >
              Wago Payment
            </h1>
            <p
              class="text-[10px] font-bold text-emerald-600 flex items-center gap-1"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"
              ></span>
              SECURE CHECKOUT
            </p>
          </div>
        </div>
        <button
          onclick="confirmCancel()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-red-500 border border-slate-200 shadow-sm active:scale-95 transition-all"
        >
          ✕
        </button>
      </header>

      <main
        id="app-content"
        class="flex-1 overflow-y-auto no-scrollbar relative bg-[#f8fafc] p-4 pb-24"
      ></main>

      <footer
        id="action-area"
        class="flex-none p-5 bg-white border-t border-slate-100 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] absolute bottom-0 w-full"
      ></footer>
    </div>

    <div
      id="custom-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 transition-all duration-300"
    >
      <div
        class="bg-white p-6 rounded-[2rem] shadow-2xl w-full max-w-xs text-center border border-white/50 transform scale-100 transition-transform duration-300"
      >
        <div
          class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"
        >
          ⚠️
        </div>
        <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">
          Konfirmasi
        </h3>
        <p id="modal-msg" class="text-sm text-slate-500 mb-6">
          Batalkan transaksi ini?
        </p>
        <div class="grid grid-cols-2 gap-3" id="modal-actions">
          <button
            onclick="closeModal()"
            class="py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-50 text-xs border border-transparent hover:border-slate-100 transition-all"
          >
            Kembali
          </button>
          <button
            id="modal-confirm-btn"
            class="py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg text-xs"
          >
            Ya, Batal
          </button>
        </div>
        <div id="modal-alert-action" class="hidden">
          <button
            onclick="closeModal()"
            class="w-full py-3 rounded-xl font-bold text-white bg-slate-900 hover:bg-black transition-all text-xs"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <input type="hidden" id="customerWa" />
    <input type="hidden" id="customerEmail" />

    <script>
      const bankData = [
        {
          id: "bcava",
          name: "Bank BCA",
          logo: "https://i.ibb.co.com/cpwdVHJ/bca.png",
        },
        {
          id: "bni",
          name: "Bank BNI",
          logo: "https://i.ibb.co.com/9D7pyK1/36384348ef9d7bfff66da6da9e975d56-3072258775.png",
        },
        {
          id: "seabank",
          name: "SeaBank",
          logo: "https://i.ibb.co.com/YBCpfj0H/image.png",
        },
        {
          id: "jago",
          name: "Bank Jago",
          logo: "https://i.ibb.co.com/ns09z7Q7/logo-bank-jago.png",
        },
        {
          id: "neobank",
          name: "Neo Bank",
          logo: "https://i.ibb.co.com/msMsLtc/bank-neo.png",
        },
      ];

      let state = {
        step: 1,
        totalAmount: 0,
        items: [],
        selectedMethod: "qris",
        timeoutMinutes: 15,
        refId: "",
        activeQrisData: null,
        notifyUrl: "",
        merchantEmail: "",
        returnUrl: "",
      };
      const formatRupiah = (n) =>
        new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(n);

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        state.returnUrl = params.get("return") || document.referrer || "/";
        state.notifyUrl = params.get("notify") || "";
        state.refId = params.get("ref_id") || "ORD-" + Date.now();
        state.merchantEmail = params.get("merchant");

        if (params.get("store"))
          document.getElementById("header-title").innerText =
            decodeURIComponent(params.get("store"));

        const itemsEncoded = params.get("items");
        if (itemsEncoded) {
          try {
            state.items = JSON.parse(atob(itemsEncoded));
            state.totalAmount = state.items.reduce(
              (sum, item) => sum + (parseInt(item.p) || 0),
              0,
            );
          } catch (e) {
            fallbackSingleItem(params);
          }
        } else {
          fallbackSingleItem(params);
        }

        if (state.totalAmount === 0 && params.get("price"))
          state.totalAmount = parseInt(params.get("price"));
        if (state.totalAmount <= 0) {
          renderInvalidLink();
          return;
        }

        document.getElementById("customerWa").value = params.get("wa") || "-";
        document.getElementById("customerEmail").value =
          params.get("email") || "guest@mail.com";
        renderStep1();
      };

      function fallbackSingleItem(params) {
        const prod = decodeURIComponent(params.get("prod") || "Pembayaran");
        const price = parseInt(params.get("price")) || 0;
        if (price > 0) {
          state.items = [{ n: prod, p: price }];
          state.totalAmount = price;
        }
      }

      function renderInvalidLink() {
        const content = document.getElementById("app-content");
        document.getElementById("action-area").style.display = "none";
        content.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center px-6 fade-enter"><div class="w-20 h-20 bg-slate-100 rounded-[2rem] flex items-center justify-center mb-6 shadow-sm border border-slate-200"><span class="text-4xl">🔗</span></div><h2 class="text-2xl font-extrabold text-slate-800 mb-2">Link Tidak Valid</h2><p class="text-sm text-slate-500 mb-8 leading-relaxed">Silakan minta link baru dari penjual.</p></div>`;
      }

      window.selectMethod = (id) => {
        state.selectedMethod = id;
        updateVisualSelection();
      };

      function updateVisualSelection() {
        ["qris", ...bankData.map((b) => b.id)].forEach((id) => {
          const el = document.getElementById("method-" + id);
          const radio = document.getElementById("radio-" + id);
          if (!el) return;
          const active = state.selectedMethod === id;
          if (id === "qris") {
            el.className = `cursor-pointer relative p-4 rounded-2xl transition-all duration-300 border ${active ? "bg-slate-800 text-white ring-2 ring-slate-800 border-transparent shadow-xl" : "bg-white text-slate-700 border-slate-200 hover:border-slate-300"}`;
            if (radio)
              radio.className = `w-5 h-5 rounded-full border-2 ${active ? "bg-emerald-400 border-slate-800" : "border-slate-300"}`;
          } else {
            el.className = `cursor-pointer relative p-3 rounded-2xl border transition-all duration-200 mb-3 flex items-center gap-4 ${active ? "bg-slate-800 text-white ring-2 ring-slate-800 border-transparent shadow-xl" : "bg-white border-slate-200 hover:border-slate-300"}`;
            if (radio)
              radio.className = `w-5 h-5 rounded-full border-2 flex items-center justify-center ${active ? "bg-emerald-400 border-slate-800" : "border-slate-300 bg-white"}`;
          }
        });
      }

      function renderStep1() {
        const content = document.getElementById("app-content");
        const itemsHtml = state.items
          .map(
            (i) =>
              `<div class="flex items-start gap-3 py-3 border-b border-dashed border-slate-100 last:border-0"><div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-500 flex items-center justify-center flex-shrink-0 border border-indigo-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg></div><div class="flex-1 min-w-0 pt-0.5"><p class="text-xs font-bold text-slate-700 truncate leading-tight mb-0.5">${i.n}</p><p class="text-[10px] text-slate-400">Qty: 1</p></div><span class="font-bold text-xs text-slate-800 whitespace-nowrap pt-0.5">${formatRupiah(i.p)}</span></div>`,
          )
          .join("");
        const qrisLogoUrl =
          "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png";

        content.innerHTML = `
                <div class="px-4 py-4 fade-enter">
                    <div class="mb-6"><div class="flex items-center justify-between mb-3 px-1"><h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Detail Pesanan</h2></div>
                    <div class="bg-white rounded-[1.5rem] p-5 shadow-sm border border-slate-100"><div class="space-y-1 mb-3 max-h-[180px] overflow-y-auto pr-1 custom-scroll">${itemsHtml}</div>
                    <div class="mt-2 pt-4 border-t border-slate-100 flex justify-between items-center"><div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Tagihan</p></div><span class="text-xl font-extrabold text-slate-900 tracking-tight">${formatRupiah(state.totalAmount)}</span></div></div></div>
                    <div><h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">Metode Pembayaran</h2><div id="method-qris" onclick="selectMethod('qris')" class="cursor-pointer relative p-4 rounded-2xl transition-all duration-300 bg-white text-slate-700 border border-slate-200 hover:border-slate-300"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white p-1 border border-white/20"><img src="${qrisLogoUrl}" class="w-full h-full object-contain"></div><div class="flex-1"><h4 class="font-bold text-sm">QRIS (Otomatis)</h4><p class="text-[10px] opacity-80 mt-0.5">Support All E-Wallet & M-Banking</p></div><div id="radio-qris" class="w-5 h-5 rounded-full border-2 border-slate-300"></div></div></div></div>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="processCheckout()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">BAYAR SEKARANG</button>`;
        setTimeout(() => {
          updateVisualSelection();
        }, 100);
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerHTML = `LOADING...`;
        btn.disabled = true;
        try {
          const res = await fetch("/api/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              product_name: state.items[0].n,
              price: state.totalAmount,
              customer_contact: document.getElementById("customerWa").value,
              customer_email: document.getElementById("customerEmail").value,
              method: state.selectedMethod,
              ref_id: state.refId,
              notify_url: state.notifyUrl,
              merchant_email: state.merchantEmail,
              store_name: document.getElementById("header-title").innerText,
            }),
          });
          const d = await res.json();
          if (d.status === "success") {
            renderStep2(d);
          } else {
            alert(d.error);
            btn.innerHTML = "BAYAR SEKARANG";
            btn.disabled = false;
          }
        } catch (e) {
          alert("Koneksi Error");
          btn.innerHTML = "BAYAR SEKARANG";
          btn.disabled = false;
        }
      }

      function renderStep2(apiData) {
        state.step = 2;
        document.getElementById("app-content").innerHTML =
          `<div class="px-4 py-4 text-center fade-enter flex flex-col items-center"><div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xl mb-6"><h3 class="font-bold mb-3 text-sm">${apiData.qris_meta?.name || "Wago Merchant"}</h3><img src="${apiData.qr_image}" class="w-64 h-64 border-2 border-slate-900 rounded-lg p-1"><p class="text-[10px] text-slate-400 font-mono mt-3">ORDER ID: ${apiData.order_id}</p></div><h2 class="text-2xl font-extrabold text-slate-800">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2><p class="text-xs text-emerald-500 font-bold mt-2 animate-pulse">MENUNGGU PEMBAYARAN...</p></div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="confirmCancel()" class="w-full py-4 border rounded-2xl text-slate-400 text-xs font-bold">BATALKAN TRANSAKSI</button>`;
        startCheckingStatus(apiData.order_id);
      }

      function startCheckingStatus(id) {
        const checker = setInterval(async () => {
          const res = await fetch(
            `/api/status?order_id=${id}&t=${Date.now()}`,
            { cache: "no-store" },
          );
          const d = await res.json();
          if (d.status === "PAID") {
            clearInterval(checker);
            renderStep3();
          }
        }, 3000);
      }

      function renderStep3() {
        state.step = 3;
        const dateStr = new Date()
          .toLocaleString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          })
          .replace(".", ":");
        const itemsList = state.items
          .map(
            (i) =>
              `<div class="flex justify-between text-xs text-slate-600 mb-2 border-b border-dashed border-slate-100 pb-2 last:border-0 last:pb-0"><span class="font-medium text-slate-700 truncate max-w-[70%]">${i.n}</span><span class="font-bold text-slate-900">Rp ${i.p.toLocaleString("id-ID")}</span></div>`,
          )
          .join("");

        document.getElementById("app-content").innerHTML = `
                <div class="p-2 success-pop flex flex-col items-center justify-center">
                    <div class="w-full bg-white shadow-xl rounded-[1.5rem] overflow-hidden relative border border-slate-100 mb-6">
                        <div class="h-2 bg-emerald-500 w-full"></div>
                        <div class="p-6 text-center border-b border-dashed border-slate-200 bg-white relative z-10"><div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-emerald-100 shadow-sm"><svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div><h2 class="text-xl font-extrabold text-slate-900 tracking-tight uppercase">Pembayaran Lunas</h2><p class="text-[10px] text-slate-400 mt-1 font-medium">TERIMA KASIH, PESANAN ANDA TELAH LUNAS</p></div>
                        <div class="p-6 bg-[#f8fafc]"><div class="space-y-3"><div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider"><span>Tanggal</span><span class="text-slate-700 font-bold normal-case">${dateStr}</span></div><div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider"><span>ID Transaksi</span><span class="font-mono text-slate-700 font-bold normal-case text-[10px]">${state.refId}</span></div><div class="my-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">RINCIAN ITEM</p><div class="max-h-[100px] overflow-y-auto pr-1 custom-scroll">${itemsList}</div></div><div class="flex justify-between items-center pt-2 border-t border-slate-200/50 mt-2"><span class="font-bold text-slate-500 text-xs uppercase tracking-wider">Total Paid</span><span class="text-xl font-extrabold text-emerald-600">Rp ${state.totalAmount.toLocaleString("id-ID")}</span></div></div></div>
                        <div class="receipt-cut w-full absolute bottom-0 left-0 z-20"></div>
                    </div>
                    <div class="text-center space-y-2 mb-4"><p class="text-xs text-slate-400 font-medium">Otomatis kembali dalam <span id="redirect-timer" class="font-bold text-slate-600 bg-slate-200 px-2 py-0.5 rounded text-[10px]">5</span> detik</p></div>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.href=state.returnUrl" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl">KEMBALI KE TOKO</button>`;

        let seconds = 5;
        const redirectInterval = setInterval(() => {
          seconds--;
          if (document.getElementById("redirect-timer"))
            document.getElementById("redirect-timer").innerText = seconds;
          if (seconds <= 0) {
            clearInterval(redirectInterval);
            window.location.href = state.returnUrl;
          }
        }, 1000);
      }

      function confirmCancel() {
        if (state.step === 1) {
          window.location.href = state.returnUrl;
          return;
        }
        location.reload();
      }
      function closeModal() {
        document.getElementById("custom-modal").classList.add("hidden");
      }
    </script>
  </body>
</html>
