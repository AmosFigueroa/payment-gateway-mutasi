<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment ID</title>

    <link
      id="dynamic-favicon"
      rel="icon"
      type="image/png"
      href="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
        background-image:
          radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
        background-size: cover;
        background-attachment: fixed;
        color: #334155;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .fade-enter {
        animation: fadeEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .receipt-cut {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 8px,
          #f8fafc 9px
        );
        background-size: 20px 10px;
        background-repeat: repeat-x;
        height: 12px;
        width: 100%;
        transform: rotate(180deg);
      }
      .success-pop {
        animation: successPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards;
      }
    </style>
  </head>
  <body>
    <div
      id="main-container"
      class="w-full h-full sm:max-w-[420px] sm:h-[90vh] glass-panel sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col sm:border sm:border-white/40 z-10 transition-all duration-500"
    >
      <header
        class="flex-none px-6 py-4 bg-white/90 border-b border-slate-100 flex items-center justify-between backdrop-blur-xl z-20 sticky top-0"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-md border border-slate-200 overflow-hidden p-1"
          >
            <img
              id="header-logo"
              src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
              class="w-full h-full object-contain"
            />
          </div>
          <div>
            <h1
              id="header-title"
              class="font-bold text-base text-slate-900 leading-tight"
            >
              Wagopay
            </h1>
            <p
              class="text-[10px] font-bold text-emerald-600 flex items-center gap-1"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"
              ></span>
              SECURE CHECKOUT
            </p>
          </div>
        </div>
        <button
          onclick="location.reload()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-200 shadow-sm active:scale-95 transition-all"
        >
          ✕
        </button>
      </header>
      <main
        id="app-content"
        class="flex-1 overflow-y-auto no-scrollbar relative bg-[#f8fafc] p-4 pb-24"
      ></main>
      <footer
        id="action-area"
        class="flex-none p-5 bg-white border-t border-slate-100 z-20 absolute bottom-0 w-full"
      ></footer>
    </div>

    <script>
      let state = {
        step: 1,
        totalAmount: 0,
        items: [],
        selectedMethod: "qris",
        timeoutMinutes: 15,
        refId: "",
        merchantEmail: "",
        returnUrl: "",
        timerInterval: null,
      };
      const formatRupiah = (n) =>
        new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(n);

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        state.returnUrl = params.get("return") || "/";
        state.merchantEmail = params.get("merchant");
        state.refId = params.get("ref_id") || "ORD-" + Date.now();
        if (params.get("store"))
          document.getElementById("header-title").innerText =
            decodeURIComponent(params.get("store"));

        const price = parseInt(params.get("price")) || 0;
        const prod = decodeURIComponent(params.get("prod") || "Pembayaran");
        state.items = [{ n: prod, p: price }];
        state.totalAmount = price;

        if (state.totalAmount <= 0) {
          document.getElementById("app-content").innerHTML =
            `<div class="text-center py-20 font-bold">Link Tidak Valid</div>`;
        } else {
          renderStep1();
        }
      };

      function renderStep1() {
        document.getElementById("app-content").innerHTML = `
                <div class="px-4 py-4 fade-enter">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">DETAIL PESANAN</h2>
                    <div class="bg-white rounded-[1.5rem] p-6 shadow-sm border border-slate-100 mb-8">
                        <div class="flex justify-between items-center mb-6 text-sm text-slate-500 font-medium"><span>${state.items[0].n}</span><span>Rp ${state.totalAmount.toLocaleString("id-ID")}</span></div>
                        <div class="pt-4 border-t border-slate-100 flex justify-between items-center font-bold text-slate-800"><span class="text-lg">Total</span><span class="text-2xl font-extrabold tracking-tight">Rp ${state.totalAmount.toLocaleString("id-ID")}</span></div>
                    </div>
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">METODE PEMBAYARAN</h2>
                    <div class="p-5 bg-[#1e293b] text-white rounded-[1.2rem] shadow-xl border border-transparent"><h4 class="font-bold text-base">QRIS (Otomatis)</h4><p class="text-xs text-slate-400 mt-1">Support All E-Wallet & M-Banking</p></div>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="processCheckout()" class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-sm uppercase tracking-wider">BAYAR SEKARANG</button>`;
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerText = "PROSES...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              product_name: state.items[0].n,
              price: state.totalAmount,
              method: "qris",
              ref_id: state.refId,
              merchant_email: state.merchantEmail,
              store_name: document.getElementById("header-title").innerText,
            }),
          });
          const d = await res.json();
          if (d.status === "success") renderStep2(d);
        } catch (e) {
          alert("Error!");
          btn.innerText = "BAYAR SEKARANG";
          btn.disabled = false;
        }
      }

      function renderStep2(apiData) {
        document.getElementById("app-content").innerHTML = `
                <div class="px-4 py-4 text-center fade-enter flex flex-col items-center">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-red-50 text-red-600 rounded-full text-[10px] font-bold mb-6 border border-red-100 animate-pulse"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg> SISA WAKTU <span id="timer" class="font-mono text-xs ml-1">15:00</span></div>
                    <div class="bg-white p-5 rounded-[1.5rem] border border-slate-100 shadow-xl mb-6 relative overflow-hidden">
                        <div class="bg-[#bf1e2e] h-8 -mx-5 -mt-5 mb-5 flex items-center justify-between px-4"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png" class="h-4 brightness-0 invert"><span class="text-white font-bold text-[8px] tracking-widest">NATIONAL STANDARD</span></div>
                        <h3 class="font-bold mb-3 text-slate-800 text-sm">${apiData.qris_meta?.name || "WAGO MERCHANT"}</h3>
                        <img src="${apiData.qr_image}" class="w-64 h-64 border-2 border-slate-900 rounded-lg p-1">
                        <p class="text-[10px] text-slate-400 font-mono mt-3 uppercase tracking-wider">ORDER ID: ${apiData.order_id}</p>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2>
                    <p class="text-xs text-emerald-500 font-bold mt-2 animate-pulse">MENUNGGU PEMBAYARAN...</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="location.reload()" class="w-full py-4 bg-white text-slate-400 font-bold rounded-2xl border border-slate-200 text-xs active:scale-95 transition-all">BATALKAN TRANSAKSI</button>`;
        startTimer(15 * 60);
        startCheckingStatus(apiData.order_id);
      }

      function startTimer(duration) {
        let timer = duration;
        state.timerInterval = setInterval(() => {
          let m = parseInt(timer / 60, 10),
            s = parseInt(timer % 60, 10);
          document.querySelector("#timer").textContent =
            (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
          if (--timer < 0) {
            clearInterval(state.timerInterval);
            location.reload();
          }
        }, 1000);
      }

      function startCheckingStatus(id) {
        const checker = setInterval(async () => {
          const res = await fetch(
            `/api/status?order_id=${id}&t=${Date.now()}`,
            { cache: "no-store" },
          );
          const d = await res.json();
          if (d.status === "PAID") {
            clearInterval(checker);
            clearInterval(state.timerInterval);
            renderStep3();
          }
        }, 3000);
      }

      function renderStep3() {
        const dateStr = new Date()
          .toLocaleString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          })
          .replace(".", ":");
        document.getElementById("app-content").innerHTML = `
                <div class="p-2 success-pop flex flex-col items-center justify-center">
                    <div class="w-full bg-white shadow-2xl rounded-[1.5rem] overflow-hidden relative border border-slate-100">
                        <div class="h-2 bg-emerald-500"></div>
                        <div class="p-6 text-center border-b border-dashed border-slate-200 bg-white">
                            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-emerald-100"><svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div>
                            <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase">Pembayaran Lunas</h2><p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-wider">Terima kasih, pesanan Anda telah lunas</p>
                        </div>
                        <div class="p-6 bg-[#f8fafc] text-[11px] space-y-3 font-bold">
                            <div class="flex justify-between text-slate-400"><span>Tanggal</span><span class="text-slate-700 font-bold">${dateStr}</span></div>
                            <div class="flex justify-between text-slate-400"><span>ID Transaksi</span><span class="text-slate-700">${state.refId}</span></div>
                            <div class="pt-4 border-t border-slate-200 flex justify-between items-center"><span class="text-slate-400 uppercase tracking-widest">Total Paid</span><span class="text-xl font-black text-emerald-600">Rp ${state.totalAmount.toLocaleString("id-ID")}</span></div>
                        </div><div class="receipt-cut"></div>
                    </div><p class="text-[10px] text-slate-400 mt-10 uppercase tracking-widest">Otomatis kembali dalam <span id="redirect-timer" class="font-bold text-slate-900">5</span> detik</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.href='${state.returnUrl}'" class="w-full py-4 bg-[#0f172a] text-white font-bold rounded-2xl shadow-xl">KEMBALI KE TOKO</button>`;
        let s = 5;
        const redirect = setInterval(() => {
          s--;
          if (document.getElementById("redirect-timer"))
            document.getElementById("redirect-timer").innerText = s;
          if (s <= 0) {
            clearInterval(redirect);
            window.location.href = state.returnUrl;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
