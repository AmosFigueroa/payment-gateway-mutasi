<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
        color: #334155;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        overflow: hidden;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
      }
      .receipt-cut {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 8px,
          #f8fafc 9px
        );
        background-size: 20px 10px;
        height: 12px;
        width: 100%;
        transform: rotate(180deg);
        position: absolute;
        bottom: 0;
        left: 0;
      }
      .fade-enter {
        animation: fadeEnter 0.5s ease-out forwards;
      }
      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="main-container"
      class="w-full h-full sm:max-w-[400px] sm:h-[90vh] glass-panel sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col"
    >
      <header
        class="px-6 py-4 bg-white border-b flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <img
            src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
            class="w-8 h-8 object-contain"
          />
          <h1 id="header-title" class="font-bold text-slate-900">Wagopay</h1>
        </div>
        <button onclick="location.reload()" class="text-slate-400">✕</button>
      </header>
      <main
        id="app-content"
        class="flex-1 overflow-y-auto bg-[#f8fafc] p-4 pb-20"
      ></main>
      <footer
        id="action-area"
        class="p-4 bg-white border-t absolute bottom-0 w-full"
      ></footer>
    </div>

    <script>
      let state = {
        totalAmount: 0,
        productName: "",
        refId: "",
        customerEmail: "",
        merchantEmail: "",
        returnUrl: "",
      };

      window.onload = function () {
        const p = new URLSearchParams(window.location.search);
        state.returnUrl = p.get("return") || "/";
        state.merchantEmail = p.get("merchant");
        state.customerEmail = p.get("email") || "guest@mail.com";
        state.productName = decodeURIComponent(p.get("prod") || "Pembayaran");
        state.totalAmount = parseInt(p.get("price")) || 0;
        state.refId = p.get("ref_id") || "INV-" + Date.now();

        if (p.get("store"))
          document.getElementById("header-title").innerText =
            decodeURIComponent(p.get("store"));
        renderStep1();
      };

      function renderStep1() {
        document.getElementById("app-content").innerHTML = `
                <div class="fade-enter">
                    <div class="bg-white p-5 rounded-2xl border mb-6">
                        <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Detail Pesanan</p>
                        <div class="flex justify-between font-bold text-sm"><span>${state.productName}</span><span>Rp ${state.totalAmount.toLocaleString("id-ID")}</span></div>
                    </div>
                    <div class="p-5 bg-slate-800 text-white rounded-2xl shadow-xl">
                        <h4 class="font-bold">QRIS (Otomatis)</h4>
                        <p class="text-[10px] text-slate-400">Support All E-Wallet & M-Banking</p>
                    </div>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="processCheckout()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg">BAYAR SEKARANG</button>`;
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerText = "PROSES...";
        btn.disabled = true;
        const res = await fetch("/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            product_name: state.productName,
            price: state.totalAmount,
            customer_email: state.customerEmail,
            ref_id: state.refId,
            merchant_email: state.merchantEmail,
            store_name: document.getElementById("header-title").innerText,
          }),
        });
        const d = await res.json();
        if (d.status === "success") renderStep2(d);
      }

      function renderStep2(apiData) {
        document.getElementById("app-content").innerHTML = `
                <div class="fade-enter text-center">
                    <div class="bg-white p-5 rounded-[2rem] border shadow-xl mb-6 flex flex-col items-center">
                        <div class="bg-[#bf1e2e] h-8 -mx-5 -mt-5 mb-5 w-[calc(100%+40px)] flex items-center justify-center"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png" class="h-4 brightness-0 invert"></div>
                        <img src="${apiData.qr_image}" class="w-64 h-64 border-2 border-slate-900 rounded-lg p-1">
                        <p class="text-[10px] text-slate-400 font-mono mt-3 tracking-widest uppercase">ID: ${apiData.order_id}</p>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2>
                    <p class="text-xs text-emerald-500 font-bold mt-2 animate-pulse uppercase tracking-widest">Menunggu Pembayaran...</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="location.reload()" class="w-full py-4 border rounded-2xl text-slate-400 text-xs font-bold">BATALKAN</button>`;
        startCheckingStatus(apiData.order_id);
      }

      function startCheckingStatus(id) {
        const checker = setInterval(async () => {
          const res = await fetch(`/api/status?order_id=${id}&t=${Date.now()}`);
          const d = await res.json();
          if (d.status === "PAID") {
            clearInterval(checker);
            renderStep3();
          }
        }, 3000);
      }

      function renderStep3() {
        const dateStr = new Date()
          .toLocaleString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          })
          .replace(".", ":");
        document.getElementById("app-content").innerHTML = `
                <div class="fade-enter flex flex-col items-center">
                    <div class="w-full bg-white shadow-2xl rounded-[1.5rem] overflow-hidden relative border min-h-[300px]">
                        <div class="h-2 bg-emerald-500"></div>
                        <div class="p-6 text-center border-b border-dashed">
                            <h2 class="text-xl font-black text-slate-900 uppercase">Pembayaran Lunas</h2>
                            <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">Terima kasih atas pesanan Anda</p>
                        </div>
                        <div class="p-6 bg-[#f8fafc] text-[11px] space-y-3 font-bold">
                            <div class="flex justify-between text-slate-400 uppercase tracking-widest"><span>Tanggal</span><span class="text-slate-700">${dateStr}</span></div>
                            <div class="flex justify-between text-slate-400 uppercase tracking-widest"><span>Item</span><span class="text-slate-700">${state.productName}</span></div>
                            <div class="pt-4 border-t flex justify-between items-center"><span class="text-slate-400 uppercase tracking-widest">Total Paid</span><span class="text-xl font-black text-emerald-600">Rp ${state.totalAmount.toLocaleString("id-ID")}</span></div>
                        </div>
                        <div class="receipt-cut"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-10 uppercase tracking-widest">Kembali dalam <span id="timer">5</span> detik</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.href='${state.returnUrl}'" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg">KEMBALI KE TOKO</button>`;
        let s = 5;
        const redirect = setInterval(() => {
          s--;
          if (document.getElementById("timer"))
            document.getElementById("timer").innerText = s;
          if (s <= 0) {
            clearInterval(redirect);
            window.location.href = state.returnUrl;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
