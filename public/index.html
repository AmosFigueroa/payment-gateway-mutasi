<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wago Payment - QRIS Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap");
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen flex flex-col items-center">
    <div
      class="w-full max-w-md bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <div class="bg-emerald-500 p-1.5 rounded-lg">
          <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
        </div>
        <h1 id="header-title" class="font-bold text-slate-800 text-lg">
          Wago Payment
        </h1>
      </div>
      <a
        href="/merchant"
        class="text-xs font-semibold bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-2 rounded-full transition-all flex items-center gap-1"
      >
        <i data-lucide="layout-dashboard" class="w-3 h-3"></i> Portal
      </a>
    </div>

    <main id="app-content" class="w-full max-w-md p-6">
      <div class="flex flex-col items-center justify-center py-20">
        <div
          class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-500"
        ></div>
        <p class="mt-4 text-slate-500 font-medium">Memuat Tagihan...</p>
      </div>
    </main>

    <footer id="action-area" class="w-full max-w-md p-6 mt-auto"></footer>

    <script>
      // --- KONFIGURASI API ---
      const BASE_API = "/api"; // Gunakan path relatif agar lebih stabil di Vercel
      const qrisLogo =
        "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png";

      let state = {
        productName: "Pembayaran",
        totalAmount: 0,
        merchantEmail: "",
        storeName: "Wago Store",
        orderId: "",
      };

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        state.totalAmount = parseInt(params.get("price")) || 0;
        state.productName = decodeURIComponent(
          params.get("prod") || "Pembayaran",
        );
        state.merchantEmail = params.get("merchant") || "admin@wagopayment.id";
        state.storeName = decodeURIComponent(
          params.get("store") || "Wago Store",
        );

        document.getElementById("header-title").innerText = state.storeName;

        if (state.totalAmount > 0) {
          renderStep1();
        } else {
          document.getElementById("app-content").innerHTML = `
                    <div class="text-center py-10">
                        <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                        <p class="text-slate-700 font-bold">Data tidak valid</p>
                        <p class="text-sm text-slate-500">Harap gunakan link pembayaran yang benar.</p>
                    </div>
                `;
        }
        lucide.createIcons();
      };

      function renderStep1() {
        document.getElementById("app-content").innerHTML = `
                <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm mb-6">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Nama Produk</p>
                    <h2 class="text-xl font-extrabold text-slate-800 mb-4">${state.productName}</h2>
                    <hr class="border-dashed mb-4">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total Pembayaran</p>
                    <h2 class="text-3xl font-black text-emerald-600">Rp ${state.totalAmount.toLocaleString("id-ID")}</h2>
                </div>
            `;
        document.getElementById("action-area").innerHTML = `
                <button onclick="processCheckout()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    BAYAR SEKARANG <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            `;
        lucide.createIcons();
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> PROSES...`;
        btn.disabled = true;

        try {
          const response = await fetch(`${BASE_API}/checkout`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              price: state.totalAmount,
              product_name: state.productName,
              store_name: state.storeName,
              merchant_email: state.merchantEmail,
            }),
          });

          const data = await response.json();
          if (data.status === "success") {
            renderStep2(data);
          } else {
            alert("Error: " + data.error);
            renderStep1();
          }
        } catch (error) {
          alert("Koneksi gagal!");
          renderStep1();
        }
      }

      function renderStep2(apiData) {
        document.getElementById("app-content").innerHTML = `
                <div class="bg-white rounded-3xl overflow-hidden border shadow-xl animate-in fade-in zoom-in duration-300">
                    <div class="bg-[#bf1e2e] py-3 flex justify-center">
                        <img src="${qrisLogo}" class="h-6 brightness-0 invert">
                    </div>
                    
                    <div class="p-6 text-center">
                        <p class="text-sm font-bold text-slate-800 mb-1 uppercase">${state.storeName}</p>
                        <p class="text-[10px] text-slate-400 mb-4">NMID: ID1024363913731</p>
                        
                        <div class="bg-white p-2 border-2 border-slate-900 rounded-xl inline-block mb-4">
                            <img src="${apiData.qr_image}" class="w-64 h-64 mx-auto">
                        </div>

                        <div class="bg-emerald-50 rounded-2xl py-4 border border-emerald-100">
                            <p class="text-xs font-bold text-emerald-600 mb-1">TOTAL BAYAR (TERMASUK KODE UNIK)</p>
                            <h2 class="text-3xl font-black text-slate-900">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2>
                        </div>
                        
                        <p class="text-[10px] text-slate-400 mt-4 leading-relaxed">
                            Mohon transfer sesuai nominal hingga 3 digit terakhir.<br>
                            Sistem akan mendeteksi pembayaran secara otomatis.
                        </p>
                    </div>
                </div>
            `;
        document.getElementById("action-area").innerHTML = `
                <div class="text-center">
                    <p class="text-sm text-slate-500 mb-2">Menunggu pembayaran...</p>
                    <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full animate-[progress_30s_linear_infinite]"></div>
                    </div>
                </div>
            `;
        lucide.createIcons();
      }
    </script>

    <style>
      @keyframes progress {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }
    </style>
  </body>
</html>
