<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment ID</title>
    <link
      id="dynamic-favicon"
      rel="icon"
      type="image/png"
      href="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
        background-image:
          radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
        background-size: cover;
        background-attachment: fixed;
        color: #334155;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .fade-enter {
        animation: fadeEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .receipt-cut {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 8px,
          #f8fafc 9px
        );
        background-size: 20px 10px;
        background-repeat: repeat-x;
        height: 12px;
        width: 100%;
        transform: rotate(180deg);
      }
      .success-pop {
        animation: successPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards;
      }
      @keyframes successPop {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="main-container"
      class="w-full h-full sm:max-w-[420px] sm:h-[90vh] glass-panel sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col sm:border sm:border-white/40 z-10 transition-all duration-500"
    >
      <header
        class="flex-none px-6 py-4 bg-white/90 border-b border-slate-100 flex items-center justify-between backdrop-blur-xl z-20 sticky top-0"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-md border border-slate-200 overflow-hidden p-1"
          >
            <img
              id="header-logo"
              src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
              class="w-full h-full object-contain"
            />
          </div>
          <div>
            <h1
              id="header-title"
              class="font-bold text-base text-slate-900 leading-tight"
            >
              Wago Payment
            </h1>
            <p
              class="text-[10px] font-bold text-emerald-600 flex items-center gap-1"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"
              ></span>
              SECURE CHECKOUT
            </p>
          </div>
        </div>
        <button
          onclick="confirmCancel()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-red-500 border border-slate-200 shadow-sm active:scale-95 transition-all"
        >
          ✕
        </button>
      </header>

      <main
        id="app-content"
        class="flex-1 overflow-y-auto no-scrollbar relative bg-[#f8fafc] p-4 pb-24"
      ></main>
      <footer
        id="action-area"
        class="flex-none p-5 bg-white border-t border-slate-100 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] absolute bottom-0 w-full"
      ></footer>
    </div>

    <div
      id="custom-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 transition-all duration-300"
    >
      <div
        class="bg-white p-6 rounded-[2rem] shadow-2xl w-full max-w-xs text-center border border-white/50 transform scale-100 transition-transform duration-300"
      >
        <div
          class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"
        >
          ⚠️
        </div>
        <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">
          Konfirmasi
        </h3>
        <p id="modal-msg" class="text-sm text-slate-500 mb-6">
          Batalkan transaksi ini?
        </p>
        <div class="grid grid-cols-2 gap-3" id="modal-actions">
          <button
            onclick="closeModal()"
            class="py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-50 text-xs border border-transparent hover:border-slate-100 transition-all"
          >
            Kembali
          </button>
          <button
            id="modal-confirm-btn"
            class="py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg text-xs"
          >
            Ya, Batal
          </button>
        </div>
      </div>
    </div>

    <script>
      let state = {
        step: 1,
        totalAmount: 0,
        items: [],
        selectedMethod: "qris",
        timeoutMinutes: 15,
        refId: "",
        activeQrisData: null,
        notifyUrl: "",
        merchantEmail: "",
        returnUrl: "",
      };
      const formatRupiah = (n) =>
        new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(n);

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);

        // 1. TANGKAP DATA MULTI-MERCHANT DARI URL
        state.returnUrl = params.get("return") || document.referrer || "/";
        state.notifyUrl = params.get("notify") || "";
        state.refId = params.get("ref_id") || "ORD-" + Date.now();
        state.merchantEmail = params.get("merchant");

        if (params.get("store"))
          document.getElementById("header-title").innerText =
            decodeURIComponent(params.get("store"));

        // 2. PARSE PRODUK
        const itemsEncoded = params.get("items");
        if (itemsEncoded) {
          try {
            state.items = JSON.parse(atob(itemsEncoded));
            state.totalAmount = state.items.reduce(
              (sum, item) => sum + (parseInt(item.p) || 0),
              0,
            );
          } catch (e) {
            fallbackSingleItem(params);
          }
        } else {
          fallbackSingleItem(params);
        }

        if (state.totalAmount <= 0 && params.get("price"))
          state.totalAmount = parseInt(params.get("price"));
        if (state.totalAmount <= 0) {
          renderInvalidLink();
          return;
        }

        state.customerWa = params.get("wa") || "-";
        state.customerEmail = params.get("email") || "guest@mail.com";

        renderStep1();
      };

      function fallbackSingleItem(params) {
        const prod = decodeURIComponent(params.get("prod") || "Pembayaran");
        const price = parseInt(params.get("price")) || 0;
        if (price > 0) {
          state.items = [{ n: prod, p: price }];
          state.totalAmount = price;
        }
      }

      function renderInvalidLink() {
        document.getElementById("app-content").innerHTML =
          `<div class="h-full flex flex-col items-center justify-center text-center px-6"><h2 class="text-xl font-bold">Link Tidak Valid</h2><p class="text-sm text-slate-400">Harap hubungi penjual.</p></div>`;
      }

      function renderStep1() {
        const content = document.getElementById("app-content");
        const itemsHtml = state.items
          .map(
            (i) =>
              `<div class="flex justify-between py-2 border-b border-slate-50 text-sm"><span>${i.n}</span><span class="font-bold">${formatRupiah(i.p)}</span></div>`,
          )
          .join("");
        content.innerHTML = `<div class="px-4 py-4 fade-enter"><h2 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Detail Pesanan</h2><div class="bg-white rounded-2xl p-5 shadow-sm border mb-6">${itemsHtml}<div class="mt-4 pt-4 border-t flex justify-between"><b>Total</b><b class="text-xl">${formatRupiah(state.totalAmount)}</b></div></div><h2 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Metode Pembayaran</h2><div onclick="selectMethod('qris')" class="p-4 bg-slate-800 text-white rounded-xl border border-transparent shadow-lg cursor-pointer"><h4 class="font-bold">QRIS (Otomatis)</h4><p class="text-xs opacity-70">Support All E-Wallet & M-Banking</p></div></div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="processCheckout()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all">BAYAR SEKARANG</button>`;
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerText = "LOADING...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              product_name: state.items[0].n,
              price: state.totalAmount,
              method: "qris",
              ref_id: state.refId,
              notify_url: state.notifyUrl,
              merchant_email: state.merchantEmail,
              customer_email: state.customerEmail,
              customer_contact: state.customerWa,
              store_name: document.getElementById("header-title").innerText,
            }),
          });
          const d = await res.json();
          if (d.status === "success") renderStep2(d);
          else alert(d.error || "Gagal membuat invoice");
        } catch (e) {
          alert("Error koneksi!");
          btn.innerText = "BAYAR SEKARANG";
          btn.disabled = false;
        }
      }

      function renderStep2(apiData) {
        state.step = 2;
        const content = document.getElementById("app-content");
        content.innerHTML = `<div class="px-4 py-4 text-center fade-enter flex flex-col items-center"><div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xl mb-6"><h3 class="font-bold mb-3">${apiData.qris_meta?.name || "Merchant"}</h3><img src="${apiData.qr_image}" class="w-64 h-64 mx-auto mb-4 border-2 border-slate-900 rounded-lg p-1"><p class="text-[10px] text-slate-400 font-mono">ORDER ID: ${apiData.order_id}</p></div><h2 class="text-3xl font-extrabold text-slate-800">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2><p class="text-xs text-slate-500 mt-2 animate-pulse">Menunggu pembayaran Anda...</p></div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="confirmCancel()" class="w-full py-4 border rounded-2xl text-slate-400 text-xs font-bold">BATALKAN TRANSAKSI</button>`;
        startCheckingStatus(apiData.order_id);
      }

      // --- ANTI CACHE & MONITORING ---
      function startCheckingStatus(id) {
        const checker = setInterval(async () => {
          try {
            // Tambahkan t=[timestamp] agar status lunas terdeteksi instan
            const res = await fetch(
              `/api/status?order_id=${id}&t=${Date.now()}`,
              { cache: "no-store" },
            );
            const d = await res.json();
            if (d.status === "PAID") {
              clearInterval(checker);
              renderLoadingTransition();
            }
          } catch (e) {
            console.error("Check Error", e);
          }
        }, 3000);
      }

      function renderLoadingTransition() {
        document.getElementById("app-content").innerHTML =
          `<div class="h-full flex flex-col items-center justify-center text-center px-6"><div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent animate-spin rounded-full mb-4"></div><h3 class="font-bold text-lg text-slate-800">Pembayaran Diterima</h3><p class="text-xs text-slate-400">Sedang memverifikasi transaksi Anda...</p></div>`;
        setTimeout(() => renderStep3(), 2000);
      }

      function renderStep3() {
        state.step = 3;
        document.getElementById("app-content").innerHTML =
          `<div class="p-6 success-pop text-center flex flex-col items-center justify-center h-full"><div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6 border-4 border-emerald-50 shadow-lg"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div><h2 class="text-3xl font-black text-slate-900 tracking-tight">BERHASIL!</h2><p class="text-sm text-slate-500 mt-2 font-medium">Terima kasih, pesanan Anda telah lunas.</p><p class="text-[10px] text-slate-400 mt-10 uppercase tracking-widest">Otomatis kembali dalam <span id="redirect-timer" class="font-bold text-slate-900">5</span> detik</p></div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.href=state.returnUrl" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl">KEMBALI KE TOKO</button>`;

        let seconds = 5;
        const redirectInt = setInterval(() => {
          seconds--;
          if (document.getElementById("redirect-timer"))
            document.getElementById("redirect-timer").innerText = seconds;
          if (seconds <= 0) {
            clearInterval(redirectInt);
            window.location.href = state.returnUrl;
          }
        }, 1000);
      }

      function confirmCancel() {
        location.reload();
      }
      function closeModal() {
        document.getElementById("custom-modal").classList.add("hidden");
      }
    </script>
  </body>
</html>
