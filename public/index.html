<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment ID</title>
    <link
      id="dynamic-favicon"
      rel="icon"
      type="image/png"
      href="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
        background-image:
          radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
        background-size: cover;
        background-attachment: fixed;
        color: #334155;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .fade-enter {
        animation: fadeEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .receipt-cut {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 8px,
          #f8fafc 9px
        );
        background-size: 20px 10px;
        height: 12px;
        width: 100%;
        transform: rotate(180deg);
        position: absolute;
        bottom: 0;
        left: 0;
      }
      .success-pop {
        animation: successPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards;
      }
    </style>
  </head>
  <body>
    <div
      id="main-container"
      class="w-full h-full sm:max-w-[420px] sm:h-[90vh] glass-panel sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col transition-all duration-500"
    >
      <header
        class="flex-none px-6 py-4 bg-white/90 border-b border-slate-100 flex items-center justify-between backdrop-blur-xl z-20 sticky top-0"
      >
        <div class="flex items-center gap-3">
          <img
            id="header-logo"
            src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
            class="w-9 h-9 object-contain"
          />
          <div>
            <h1
              id="header-title"
              class="font-bold text-base text-slate-900 leading-tight"
            >
              Wagopay
            </h1>
            <p class="text-[10px] font-bold text-emerald-600 animate-pulse">
              SECURE CHECKOUT
            </p>
          </div>
        </div>
        <button
          onclick="location.reload()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-200 shadow-sm active:scale-95"
        >
          ✕
        </button>
      </header>

      <main
        id="app-content"
        class="flex-1 overflow-y-auto no-scrollbar bg-[#f8fafc] p-4 pb-24"
      ></main>
      <footer
        id="action-area"
        class="flex-none p-5 bg-white border-t border-slate-100 z-20 absolute bottom-0 w-full"
      ></footer>
    </div>

    <script>
      let state = {
        step: 1,
        totalAmount: 0,
        productName: "",
        refId: "",
        merchantEmail: "",
        customerEmail: "",
        returnUrl: "",
      };
      const qrisLogo =
        "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png";

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        state.returnUrl = params.get("return") || "/";
        state.merchantEmail = params.get("merchant");
        state.customerEmail = params.get("email") || "guest@mail.com";

        // Perbaikan pengambilan nama produk dari URL
        state.productName = decodeURIComponent(
          params.get("prod") || "Pembayaran",
        );
        state.totalAmount = parseInt(params.get("price")) || 0;
        state.refId = params.get("ref_id") || "INV-" + Date.now();

        if (params.get("store"))
          document.getElementById("header-title").innerText =
            decodeURIComponent(params.get("store"));

        if (state.totalAmount > 0) renderStep1();
        else
          document.getElementById("app-content").innerHTML =
            `<div class="text-center py-20 font-bold">Data Tidak Valid</div>`;
      };

      function renderStep1() {
        document.getElementById("app-content").innerHTML = `
                <div class="px-4 py-4 fade-enter">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">DETAIL PESANAN</h2>
                    <div class="bg-white rounded-[1.5rem] p-6 shadow-sm border border-slate-100 mb-8">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-slate-500 font-medium">${state.productName}</span>
                            <span class="font-bold text-slate-800">Rp ${state.totalAmount.toLocaleString("id-ID")}</span>
                        </div>
                        <div class="pt-4 border-t border-slate-100 flex justify-between items-center">
                            <span class="text-lg font-bold text-slate-800">Total</span>
                            <span class="text-2xl font-extrabold text-slate-800">Rp ${state.totalAmount.toLocaleString("id-ID")}</span>
                        </div>
                    </div>
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">METODE PEMBAYARAN</h2>
                    <div class="p-5 bg-[#1e293b] text-white rounded-[1.2rem] shadow-xl border border-transparent flex items-center gap-4">
                        <img src="${qrisLogo}" class="h-6 brightness-0 invert">
                        <div><h4 class="font-bold text-sm">QRIS (Otomatis)</h4><p class="text-[10px] text-slate-400 uppercase">SUPPORT ALL E-WALLET</p></div>
                    </div>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="processCheckout()" class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-wider text-sm">BAYAR SEKARANG</button>`;
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerText = "PROSES...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              product_name: state.productName,
              price: state.totalAmount,
              customer_email: state.customerEmail,
              method: "qris",
              ref_id: state.refId,
              merchant_email: state.merchantEmail,
              store_name: document.getElementById("header-title").innerText,
            }),
          });
          const d = await res.json();
          if (d.status === "success") renderStep2(d);
        } catch (e) {
          alert("Error Server!");
          btn.innerText = "BAYAR SEKARANG";
          btn.disabled = false;
        }
      }

      function renderStep2(apiData) {
        document.getElementById("app-content").innerHTML = `
                <div class="px-4 py-4 text-center fade-enter flex flex-col items-center">
                    <div class="bg-white p-5 rounded-[1.5rem] border border-slate-100 shadow-xl mb-6 relative overflow-hidden">
                        <div class="bg-[#bf1e2e] h-8 -mx-5 -mt-5 mb-5 flex items-center justify-between px-4"><img src="${qrisLogo}" class="h-4 brightness-0 invert"><span class="text-white font-bold text-[8px] tracking-widest uppercase">National Standard</span></div>
                        <h3 class="font-bold mb-3 text-slate-800 text-sm uppercase">${apiData.qris_meta?.name || "Wago Payment"}</h3>
                        <img src="${apiData.qr_image}" class="w-64 h-64 border-2 border-slate-900 rounded-lg p-1">
                        <p class="text-[10px] text-slate-400 font-mono mt-3 uppercase tracking-wider">ORDER ID: ${apiData.order_id}</p>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2>
                    <p class="text-xs text-emerald-500 font-bold mt-2 animate-pulse uppercase">Menunggu Pembayaran...</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="location.reload()" class="w-full py-4 bg-white text-slate-400 font-bold rounded-2xl border border-slate-200 text-xs">BATALKAN TRANSAKSI</button>`;
        startCheckingStatus(apiData.order_id);
      }

      function startCheckingStatus(id) {
        const checker = setInterval(async () => {
          const res = await fetch(`/api/status?order_id=${id}&t=${Date.now()}`);
          const d = await res.json();
          if (d.status === "PAID") {
            clearInterval(checker);
            renderStep3();
          }
        }, 3000);
      }

      function renderStep3() {
        const dateStr = new Date()
          .toLocaleString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          })
          .replace(".", ":");
        document.getElementById("app-content").innerHTML = `
                <div class="p-2 success-pop flex flex-col items-center justify-center">
                    <div class="w-full bg-white shadow-2xl rounded-[1.5rem] overflow-hidden relative border border-slate-100">
                        <div class="h-2 bg-emerald-500 w-full"></div>
                        <div class="p-6 text-center border-b border-dashed border-slate-200">
                            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-emerald-100 shadow-sm"><svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div>
                            <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase">Pembayaran Lunas</h2>
                            <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold">Terima kasih, pesanan Anda telah lunas</p>
                        </div>
                        <div class="p-6 bg-[#f8fafc] text-[11px] space-y-3">
                            <div class="flex justify-between text-slate-400 font-bold uppercase"><span>Tanggal</span><span class="text-slate-700 font-bold normal-case">${dateStr}</span></div>
                            <div class="flex justify-between text-slate-400 font-bold uppercase"><span>ID Transaksi</span><span class="font-mono text-slate-700 font-bold">${state.refId}</span></div>
                            <div class="flex justify-between text-slate-400 font-bold uppercase"><span>Item</span><span class="text-slate-700 font-bold">${state.productName}</span></div>
                            <div class="pt-4 border-t border-slate-200 flex justify-between items-center">
                                <span class="font-bold text-slate-400 uppercase tracking-widest text-[9px]">Total Paid</span>
                                <span class="text-2xl font-black text-emerald-600">Rp ${state.totalAmount.toLocaleString("id-ID")}</span>
                            </div>
                        </div>
                        <div class="receipt-cut"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-10 uppercase tracking-widest font-bold">Otomatis kembali dalam <span id="redirect-timer" class="text-slate-900">5</span> detik</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.href='${state.returnUrl}'" class="w-full py-4 bg-[#0f172a] text-white font-bold rounded-2xl shadow-xl">KEMBALI KE TOKO</button>`;
        let s = 5;
        const redirect = setInterval(() => {
          s--;
          if (document.getElementById("redirect-timer"))
            document.getElementById("redirect-timer").innerText = s;
          if (s <= 0) {
            clearInterval(redirect);
            window.location.href = state.returnUrl;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
