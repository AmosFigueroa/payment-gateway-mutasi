<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment ID</title>
    <link
      id="dynamic-favicon"
      rel="icon"
      type="image/png"
      href="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
        background-image:
          radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
        background-size: cover;
        background-attachment: fixed;
        color: #334155;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .fade-enter {
        animation: fadeEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      @keyframes fadeEnter {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .receipt-cut {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 8px,
          #f8fafc 9px
        );
        background-size: 20px 10px;
        height: 12px;
        width: 100%;
        transform: rotate(180deg);
        position: absolute;
        bottom: 0;
        left: 0;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* CUSTOM MODAL STYLE */
      .modal-backdrop {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-content {
        background: white;
        border-radius: 2rem;
        width: 100%;
        max-w: 340px;
        padding: 30px;
        text-align: center;
        transform: scale(0.9);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .modal-backdrop.active {
        display: flex;
      }
      .modal-backdrop.active .modal-content {
        transform: scale(1);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="cancel-modal" class="modal-backdrop">
      <div class="modal-content shadow-2xl border border-slate-100">
        <div
          class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500"
        >
          <svg
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </div>
        <h3 class="text-xl font-extrabold text-slate-900 mb-2">
          Batalkan Transaksi?
        </h3>
        <p class="text-sm text-slate-500 mb-8 leading-relaxed">
          Pesanan Anda akan dibatalkan secara permanen. Anda yakin?
        </p>
        <div class="grid grid-cols-2 gap-3">
          <button
            onclick="closeCancelModal()"
            class="py-3.5 bg-slate-100 text-slate-600 font-bold rounded-2xl text-xs active:scale-95 transition-all"
          >
            TIDAK
          </button>
          <button
            onclick="confirmCancel()"
            class="py-3.5 bg-red-500 text-white font-bold rounded-2xl text-xs shadow-lg shadow-red-500/30 active:scale-95 transition-all"
          >
            YA, BATAL
          </button>
        </div>
      </div>
    </div>

    <div
      id="main-container"
      class="w-full h-full sm:max-w-[420px] sm:h-[90vh] glass-panel sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col transition-all duration-500"
    >
      <header
        class="flex-none px-6 py-4 bg-white/90 border-b border-slate-100 flex items-center justify-between z-20 sticky top-0"
      >
        <div class="flex items-center gap-3">
          <img
            src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
            class="w-9 h-9 object-contain"
          />
          <div>
            <h1
              id="header-title"
              class="font-bold text-base text-slate-900 leading-tight"
            >
              Wagopay
            </h1>
            <p
              class="text-[10px] font-bold text-emerald-600 flex items-center gap-1 uppercase tracking-wider"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"
              ></span>
              SECURE CHECKOUT
            </p>
          </div>
        </div>
        <button
          onclick="openCancelModal()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-200 active:scale-95 transition-all"
        >
          ✕
        </button>
      </header>

      <main
        id="app-content"
        class="flex-1 overflow-y-auto no-scrollbar bg-[#f8fafc] p-4 pb-24"
      ></main>
      <footer
        id="action-area"
        class="flex-none p-5 bg-white border-t border-slate-100 z-20 absolute bottom-0 w-full"
      ></footer>
    </div>

    <script>
      let state = {
        totalAmount: 0,
        productName: "",
        refId: "",
        customerEmail: "",
        merchantEmail: "",
        returnUrl: "",
        timerInterval: null,
      };
      const qrisLogo =
        "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo_QRIS.svg/1200px-Logo_QRIS.svg.png";

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        state.returnUrl = params.get("return") || "/";
        state.merchantEmail = params.get("merchant");
        state.customerEmail = params.get("email") || "guest@mail.com";
        state.productName = decodeURIComponent(
          params.get("prod") || "Pembayaran",
        );
        state.totalAmount = parseInt(params.get("price")) || 0;
        state.refId = params.get("ref_id") || "INV-" + Date.now();

        if (params.get("store"))
          document.getElementById("header-title").innerText =
            decodeURIComponent(params.get("store"));
        if (state.totalAmount > 0) renderStep1();
        else
          document.getElementById("app-content").innerHTML =
            `<div class="text-center py-20 font-bold">Link Tidak Valid</div>`;
      };

      function renderStep1() {
        document.getElementById("app-content").innerHTML = `
                <div class="px-4 py-4 fade-enter">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">Detail Pesanan</h2>
                    <div class="bg-white rounded-[1.5rem] p-6 shadow-sm border border-slate-100 mb-8">
                        <div class="mb-4 text-left">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Nama Produk</p>
                            <p class="text-slate-800 font-bold text-lg">${state.productName}</p>
                        </div>
                        <div class="pt-4 border-t border-slate-100 text-left">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Total Tagihan</p>
                            <p class="text-2xl font-extrabold text-slate-800 tracking-tight">Rp ${state.totalAmount.toLocaleString("id-ID")}</p>
                        </div>
                    </div>
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1 text-left">Metode Pembayaran</h2>
                    <div class="p-5 bg-[#1e293b] text-white rounded-[1.2rem] shadow-xl border border-transparent flex items-center gap-4">
                        <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center p-2"><img src="${qrisLogo}" class="object-contain w-full h-full"></div>
                        <div class="text-left"><h4 class="font-bold text-sm">QRIS (Otomatis)</h4><p class="text-[10px] text-slate-400">Support All E-Wallet & M-Banking</p></div>
                    </div>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="processCheckout()" class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-sm uppercase tracking-wider">Bayar Sekarang</button>`;
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerText = "PROSES...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              product_name: state.productName,
              price: state.totalAmount,
              customer_email: state.customerEmail,
              ref_id: state.refId,
              merchant_email: state.merchantEmail,
              store_name: document.getElementById("header-title").innerText,
            }),
          });
          const d = await res.json();
          if (d.status === "success") renderStep2(d);
        } catch (e) {
          alert("Server Error!");
          btn.innerText = "Bayar Sekarang";
          btn.disabled = false;
        }
      }

      function renderStep2(apiData) {
        document.getElementById("app-content").innerHTML = `
                <div class="px-4 py-4 text-center fade-enter flex flex-col items-center">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-red-50 text-red-600 rounded-full text-[10px] font-bold mb-6 border border-red-100 animate-pulse">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg> SISA WAKTU <span id="timer" class="font-mono text-xs ml-1">15:00</span>
                    </div>
                    <div class="bg-white p-5 rounded-[1.5rem] border border-slate-100 shadow-xl mb-6 relative overflow-hidden w-full">
                        <div class="bg-[#bf1e2e] h-10 -mx-5 -mt-5 mb-5 flex items-center justify-between px-4">
                            <img src="${qrisLogo}" class="h-5 brightness-0 invert">
                            <span class="text-white font-bold text-[10px] tracking-widest uppercase">National Standard</span>
                        </div>
                        <h3 class="font-bold mb-3 text-slate-800 text-sm uppercase">${apiData.qris_name || "WAGO MERCHANT"}</h3>
                        <img src="${apiData.qr_image}" class="w-full max-w-[260px] mx-auto border-2 border-slate-900 rounded-lg p-1">
                        <div class="mt-4 flex gap-2 justify-center">
                            <button onclick="downloadQR('${apiData.qr_image}', '${apiData.order_id}')" class="bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-[9px] font-extrabold border border-slate-200 uppercase">⬇️ Download</button>
                            <button onclick="copyNominal('${apiData.total_pay}')" class="bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-[9px] font-extrabold border border-slate-200 uppercase">📋 Salin Rp</button>
                        </div>
                        <p class="text-[9px] text-slate-400 font-mono mt-4 uppercase tracking-widest">ID: ${apiData.order_id}</p>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800">Rp ${apiData.total_pay.toLocaleString("id-ID")}</h2>
                    <p class="text-[10px] text-emerald-600 font-bold mt-1 uppercase">Termasuk kode unik (+${apiData.unique_code || 0})</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="openCancelModal()" class="w-full py-4 bg-white text-slate-400 font-bold rounded-2xl border border-slate-200 text-xs shadow-sm active:scale-95 transition-all">BATALKAN TRANSAKSI</button>`;
        startTimer(15 * 60);
        startCheckingStatus(apiData.order_id);
      }

      // CUSTOM MODAL LOGIC
      function openCancelModal() {
        document.getElementById("cancel-modal").classList.add("active");
      }
      function closeCancelModal() {
        document.getElementById("cancel-modal").classList.remove("active");
      }
      function confirmCancel() {
        window.location.href = state.returnUrl;
      }

      function downloadQR(img, id) {
        const link = document.createElement("a");
        link.href = img;
        link.download = `QRIS-${id}.png`;
        link.click();
      }
      function copyNominal(val) {
        navigator.clipboard
          .writeText(val)
          .then(() => alert("Nominal disalin: " + val));
      }

      function startTimer(duration) {
        let timer = duration;
        state.timerInterval = setInterval(() => {
          let m = parseInt(timer / 60, 10),
            s = parseInt(timer % 60, 10);
          if (document.querySelector("#timer"))
            document.querySelector("#timer").textContent =
              (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
          if (--timer < 0) {
            clearInterval(state.timerInterval);
            location.reload();
          }
        }, 1000);
      }

      function startCheckingStatus(id) {
        const checker = setInterval(async () => {
          const res = await fetch(`/api/status?order_id=${id}&t=${Date.now()}`);
          const d = await res.json();
          if (d.status === "PAID") {
            clearInterval(checker);
            if (state.timerInterval) clearInterval(state.timerInterval);
            if (d.product_name) state.productName = d.product_name;
            renderStep3();
          }
        }, 3000);
      }

      function renderStep3() {
        const dateStr = new Date()
          .toLocaleString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          })
          .replace(".", ":");
        document.getElementById("app-content").innerHTML = `
                <div class="p-2 fade-enter flex flex-col items-center justify-center">
                    <div class="w-full bg-white shadow-2xl rounded-[1.5rem] overflow-hidden relative border min-h-[350px]">
                        <div class="h-2 bg-emerald-500 w-full"></div>
                        <div class="p-6 text-center border-b border-dashed border-slate-200">
                            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-emerald-100 shadow-sm"><svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                            <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase">Pembayaran Lunas</h2>
                            <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-wider">Terima kasih, pesanan Anda telah lunas</p>
                        </div>
                        <div class="p-6 bg-[#f8fafc] text-[11px] space-y-3 font-bold text-left">
                            <div class="flex justify-between text-slate-400 uppercase tracking-wider"><span>Tanggal</span><span class="text-slate-700 font-bold normal-case">${dateStr}</span></div>
                            <div class="flex justify-between text-slate-400 uppercase tracking-wider"><span>ID Transaksi</span><span class="font-mono text-slate-700">${state.refId}</span></div>
                            <div class="flex justify-between text-slate-400 uppercase tracking-wider"><span>Item</span><span class="text-slate-700 uppercase">${state.productName}</span></div>
                            <div class="pt-4 border-t border-slate-200 flex justify-between items-center">
                                <span class="text-slate-400 uppercase tracking-widest text-[9px]">Total Paid</span>
                                <span class="text-2xl font-black text-emerald-600">Rp ${state.totalAmount.toLocaleString("id-ID")}</span>
                            </div>
                        </div><div class="receipt-cut"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-10 uppercase tracking-widest font-bold">Kembali dalam <span id="redirect-timer" class="text-slate-900">5</span> detik</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.href='${state.returnUrl}'" class="w-full py-4 bg-[#0f172a] text-white font-bold rounded-2xl shadow-xl">KEMBALI KE TOKO</button>`;
        let s = 5;
        const redirect = setInterval(() => {
          s--;
          if (document.getElementById("redirect-timer"))
            document.getElementById("redirect-timer").innerText = s;
          if (s <= 0) {
            clearInterval(redirect);
            window.location.href = state.returnUrl;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
