<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wago Payment - QRIS Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0f172a;
      }
      .success-pop {
        animation: successPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards;
      }
      @keyframes successPop {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div
      id="main-container"
      class="w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col transition-all duration-500 min-h-[600px]"
    >
      <header
        class="px-6 py-5 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white/90 backdrop-blur-md z-50"
      >
        <div class="flex items-center gap-3">
          <img
            src="https://i.ibb.co.com/S4Lh26Bt/logo-wago-payment-id.png"
            class="w-10 h-10 object-contain"
          />
          <div>
            <h1
              id="header-title"
              class="font-bold text-slate-900 text-base leading-tight"
            >
              Wagopay
            </h1>
            <p
              class="text-[9px] font-bold text-emerald-600 uppercase tracking-widest flex items-center gap-1"
            >
              <span
                class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"
              ></span>
              Secure Transaction
            </p>
          </div>
        </div>
        <button
          onclick="window.location.reload()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-200 active:scale-95 transition-all"
        >
          ✕
        </button>
      </header>

      <main id="app-content" class="flex-1 p-6 bg-[#f8fafc] overflow-y-auto">
        <div class="flex flex-col items-center justify-center h-full py-20">
          <div
            class="w-10 h-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"
          ></div>
          <p
            class="mt-4 text-xs font-bold text-slate-400 uppercase tracking-widest"
          >
            Inisialisasi Tagihan...
          </p>
        </div>
      </main>

      <footer
        id="action-area"
        class="p-5 bg-white border-t border-slate-100"
      ></footer>
    </div>

    <script>
      const BASE_API = "/api";
      // LINK LOGO QRIS CADANGAN (PASTI JALAN)
      const qrisLogo = "https://i.ibb.co.com/X4YQ0V0/qris-white.png";

      let state = {
        productName: "",
        totalAmount: 0,
        storeName: "Wagopay",
        returnUrl: "",
      };

      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        state.totalAmount = parseInt(params.get("price")) || 0;
        state.productName = decodeURIComponent(
          params.get("prod") || "Pembayaran",
        );
        state.storeName = decodeURIComponent(params.get("store") || "Wagopay");
        state.returnUrl = params.get("return") || "/";

        document.getElementById("header-title").innerText = state.storeName;

        if (state.totalAmount > 0) renderStep1();
        else showError("Link Pembayaran Tidak Valid");
        lucide.createIcons();
      };

      function renderStep1() {
        document.getElementById("app-content").innerHTML = `
                <div class="fade-enter">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Detail Pesanan</h2>
                    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6">
                        <p class="text-xs text-slate-400 font-medium mb-1">Item:</p>
                        <h3 class="font-bold text-slate-900 text-lg mb-4">${state.productName}</h3>
                        <div class="pt-4 border-t border-dashed border-slate-200">
                            <p class="text-xs text-slate-400 font-medium mb-1">Total Tagihan:</p>
                            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Rp ${state.totalAmount.toLocaleString("id-ID")}</h2>
                        </div>
                    </div>
                </div>`;
        document.getElementById("action-area").innerHTML = `
                <button onclick="processCheckout()" class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
                    LANJUTKAN PEMBAYARAN <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>`;
        lucide.createIcons();
      }

      async function processCheckout() {
        const btn = document.querySelector("#action-area button");
        btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> MEMPROSES...`;
        btn.disabled = true;

        try {
          const res = await fetch(`${BASE_API}/checkout`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              price: state.totalAmount,
              product_name: state.productName,
              store_name: state.storeName,
            }),
          });
          const d = await res.json();
          if (d.status === "success") renderStep2(d);
          else showError(d.error);
        } catch (e) {
          showError("Koneksi Server Gagal");
        }
      }

      function renderStep2(d) {
        document.getElementById("app-content").innerHTML = `
                <div class="success-pop flex flex-col items-center">
                    <div class="w-full bg-white rounded-[2rem] border-2 border-slate-100 shadow-xl overflow-hidden mb-6">
                        <div class="bg-[#bf1e2e] py-3 flex justify-center">
                            <img src="${qrisLogo}" style="height: 24px; width: auto;" alt="QRIS">
                        </div>
                        <div class="p-6 text-center">
                            <p class="text-[10px] font-bold text-slate-800 uppercase mb-4 tracking-widest">${state.storeName}</p>
                            
                            <div class="bg-white p-3 border-2 border-slate-900 rounded-2xl inline-block shadow-sm">
                                <img src="${d.qr_image}" class="w-64 h-64 mx-auto block" alt="Scan QRIS">
                            </div>
                            
                            <div class="mt-6 bg-emerald-50 border border-emerald-100 rounded-2xl p-4">
                                <p class="text-[10px] font-bold text-emerald-600 uppercase mb-1">Total Yang Harus Dibayar</p>
                                <h2 class="text-3xl font-black text-slate-900 tracking-tighter">Rp ${d.total_pay.toLocaleString("id-ID")}</h2>
                            </div>
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest animate-pulse">Menunggu Pembayaran...</p>
                </div>`;
        document.getElementById("action-area").innerHTML =
          `<button onclick="window.location.reload()" class="w-full py-4 bg-white text-slate-400 font-bold rounded-2xl border border-slate-200 text-xs uppercase tracking-widest">Batalkan</button>`;
      }

      function showError(msg) {
        document.getElementById("app-content").innerHTML =
          `<div class="flex flex-col items-center justify-center h-full text-center p-8"><i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mb-4"></i><h3 class="font-bold text-slate-900">${msg}</h3><button onclick="location.reload()" class="mt-4 text-emerald-600 font-bold text-xs uppercase">Coba Lagi</button></div>`;
        document.getElementById("action-area").innerHTML = "";
        lucide.createIcons();
      }
    </script>
  </body>
</html>
